<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wine Tasting</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="logo">&#127863;</div>
    <h1>Blind Tasting</h1>
    <p class="subtitle">Enter your details to begin scoring</p>

    <div id="status-msg" class="status-msg hidden"></div>

    <form id="join-form" autocomplete="off">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="e.g. Henno" required autofocus>
      </div>
      <div class="form-group">
        <label for="starting-wine">Your Starting Wine Number</label>
        <input type="number" id="starting-wine" placeholder="e.g. 4" min="1" required inputmode="numeric">
        <p class="hint" id="wine-hint"></p>
      </div>
      <button type="submit" class="btn-primary" id="join-btn">Start Tasting</button>
    </form>

    <div class="footer-links">
      <a href="/admin">Host Login</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('join-form');
    const nameInput = document.getElementById('name');
    const startInput = document.getElementById('starting-wine');
    const statusMsg = document.getElementById('status-msg');
    const wineHint = document.getElementById('wine-hint');
    const joinBtn = document.getElementById('join-btn');

    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        const data = await res.json();
        if (data.numWines > 0) {
          startInput.max = data.numWines;
          wineHint.textContent = `Enter a number between 1 and ${data.numWines}`;
        } else {
          showStatus('The host has not set up the tasting yet. Please wait and refresh.', 'error');
          joinBtn.disabled = true;
        }
      } catch (e) {
        showStatus('Could not connect to server.', 'error');
      }
    }

    function showStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className = 'status-msg ' + type;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      joinBtn.disabled = true;
      joinBtn.textContent = 'Joining...';
      try {
        const res = await fetch('/api/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: nameInput.value.trim(), startingWine: parseInt(startInput.value) }),
        });
        const data = await res.json();
        if (!res.ok) { showStatus(data.error, 'error'); joinBtn.disabled = false; joinBtn.textContent = 'Start Tasting'; return; }
        sessionStorage.setItem('wine_taster', JSON.stringify({ name: data.name, startingWine: data.startingWine, numWines: data.numWines }));
        window.location.href = '/score';
      } catch (err) { showStatus('Connection error. Please try again.', 'error'); joinBtn.disabled = false; joinBtn.textContent = 'Start Tasting'; }
    });

    const existing = sessionStorage.getItem('wine_taster');
    if (existing) { const data = JSON.parse(existing); nameInput.value = data.name; startInput.value = data.startingWine; }
    loadConfig();
  </script>
</body>
</html>
